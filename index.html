<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatGPT Web Interface</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f7f7f7;
    }
    .chat-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      background-color: white;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      border-radius: 8px;
    }
    .chat-box {
      max-height: 400px;
      overflow-y: auto;
      padding-right: 20px;
      margin-bottom: 10px;
    }
    .user-message, .bot-message {
      margin: 10px 0;
    }
    .user-message {
      text-align: right;
    }
    .bot-message {
      text-align: left;
      color: #333;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      margin-bottom: 10px;
      font-size: 16px;
    }
    button {
      padding: 10px 20px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-box" id="chatBox"></div>
    <input type="text" id="userInput" placeholder="Type your message..." />
    <button onclick="sendMessage()">Send</button>
  </div>

  <script>
    const chatBox = document.getElementById("chatBox");
    const userInput = document.getElementById("userInput");
    
    const apiKey = "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";  // Replace with your OpenAI API Key

    function appendMessage(text, isUser = false) {
      const message = document.createElement("div");
      message.classList.add(isUser ? "user-message" : "bot-message");
      message.textContent = text;
      chatBox.appendChild(message);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
      const message = userInput.value;
      if (!message.trim()) return;

      appendMessage(message, true);  // User's message
      userInput.value = '';

      const response = await fetch("https://api.openai.com/v1/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: "text-davinci-003",  // You can change to other models like text-curie-001, etc.
          prompt: message,
          max_tokens: 150
        })
      });

      const data = await response.json();
      const botMessage = data.choices[0].text.trim();
      appendMessage(botMessage);  // Bot's reply
    }
  </script>
</body>
</html>
