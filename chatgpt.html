<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatGPT Web Interface</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      padding: 20px;
    }
    #chat-box {
      background-color: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
      max-width: 600px;
      margin: 0 auto;
    }
    #messages {
      max-height: 400px;
      overflow-y: auto;
      margin-bottom: 10px;
    }
    .message {
      padding: 8px;
      margin: 5px 0;
      border-radius: 8px;
    }
    .user-message {
      background-color: #cce5ff;
      text-align: right;
    }
    .chatgpt-message {
      background-color: #f1f1f1;
    }
    #input-box {
      display: flex;
      margin-top: 10px;
    }
    #input-field {
      flex: 1;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ddd;
    }
    #send-button {
      padding: 10px 20px;
      border: none;
      background-color: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="chat-box">
    <div id="messages"></div>
    <div id="input-box">
      <input type="text" id="input-field" placeholder="Type your message...">
      <button id="send-button">Send</button>
    </div>
  </div>

  <script>
    const sendButton = document.getElementById("send-button");
    const inputField = document.getElementById("input-field");
    const messagesDiv = document.getElementById("messages");

    sendButton.onclick = () => {
      const userMessage = inputField.value;
      if (userMessage) {
        addMessage(userMessage, 'user');
        getChatGPTResponse(userMessage);
        inputField.value = '';
      }
    };

    // Function to add messages to the chat
    function addMessage(message, type) {
      const messageDiv = document.createElement("div");
      messageDiv.classList.add("message", type === 'user' ? "user-message" : "chatgpt-message");
      messageDiv.textContent = message;
      messagesDiv.appendChild(messageDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight; // Keep scroll at the bottom
    }

    // Function to get response from ChatGPT API (using OpenAI API)
    async function getChatGPTResponse(message) {
      const response = await fetch('https://api.openai.com/v1/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer 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`
        },
        body: JSON.stringify({
          model: 'gpt-3.5-turbo',
          messages: [{ role: 'user', content: message }],
          max_tokens: 150
        })
      });
      const data = await response.json();
      addMessage(data.choices[0].message.content, 'chatgpt');
    }
  </script>
</body>
</html>
